<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nighthawk Supply</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #050810;
    overflow: hidden;
  }

  .hawk {
    position: fixed;
    inset: 0;
    background: url('/static/hawk.png') center center / cover no-repeat;
    transition: opacity 0.8s ease;
  }

  /* subtle vignette */
  .hawk::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,16,0.55) 100%);
  }

  /* flash overlay on unlock */
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(0, 180, 255, 0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  .flash.active { opacity: 1; }

  /* key progress indicator — barely visible dots at bottom */
  .progress {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .dot.lit {
    background: rgba(0,180,255,0.8);
    box-shadow: 0 0 6px rgba(0,180,255,0.6);
  }
</style>
</head>
<body>

<div class="hawk"></div>
<div class="flash" id="flash"></div>

<div class="progress" id="progress">
  <div class="dot" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
  <div class="dot" id="d5"></div>
  <div class="dot" id="d6"></div>
  <div class="dot" id="d7"></div>
</div>

<script>
const CODE = [
  'ArrowUp','ArrowUp',
  'ArrowDown','ArrowDown',
  'ArrowLeft','ArrowRight',
];

let pos = 0;

document.addEventListener('keydown', e => {
  if (e.key === CODE[pos]) {
    pos++;
    document.getElementById('d' + (pos - 1)).classList.add('lit');

    if (pos === CODE.length) {
      // Unlock — flash and redirect
      const flash = document.getElementById('flash');
      flash.classList.add('active');
      setTimeout(() => {
        window.location.href = '/app';
      }, 350);
    }
  } else {
    // Wrong key — reset
    pos = 0;
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('lit'));

    // Check if the new key starts a fresh sequence
    if (e.key === CODE[0]) {
      pos = 1;
      document.getElementById('d0').classList.add('lit');
    }
  }
});
</script>
</body>
</html>
